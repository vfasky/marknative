name: Deploy Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: sudo apt-get install -y libfontconfig1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild skia-canvas for Linux
        run: |
          SKIA=$(node -e "const p=require('path'),fs=require('fs'),m=require('module');const r=m.createRequire(p.join(process.cwd(),'packages/marknative/package.json'));let d=p.dirname(r.resolve('skia-canvas'));while(!fs.existsSync(p.join(d,'package.json')))d=p.dirname(d);console.log(d)")
          cd "$SKIA" && npx node-pre-gyp install --fallback-to-build=false

      - name: Build docs
        run: |
          cd packages/marknative-docs
          bun run examples
          bunx vitepress build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/marknative-docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
