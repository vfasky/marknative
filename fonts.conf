<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Set default sans-serif font to WenQuanYi Micro Hei -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>WenQuanYi Micro Hei</string>
    </edit>
  </match>

  <!-- Set default serif font to WenQuanYi Micro Hei -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>WenQuanYi Micro Hei</string>
    </edit>
  </match>

  <!-- Set default monospace font to WenQuanYi Micro Hei Mono -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>WenQuanYi Micro Hei Mono</string>
    </edit>
  </match>

  <!-- Fallback for all generic families -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="assign" binding="strong">
      <string>WenQuanYi Micro Hei</string>
    </edit>
  </match>
</fontconfig>
